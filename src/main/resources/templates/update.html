<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회의록 수정 시스템</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { background-color: #f8f9fa; color: #333; font-family: 'Pretendard', sans-serif; }

        /* 상단 포인트 바 */
        .top-bar { height: 5px; background: linear-gradient(to right, #ff7e36, #ffb84d); width: 100%; position: fixed; top: 0; z-index: 1000; }

        .main-container { max-width: 900px; margin: 80px auto; }
        
        /* 카드 디자인 */
        .content-card { 
            border: 1px solid #e9ecef; border-radius: 12px; background: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 40px;
        }

        /* 폼 스타일 */
        .form-label { color: #555; font-size: 0.95rem; margin-bottom: 8px; }
        .form-control { 
            border-radius: 6px; border: 1px solid #ddd; padding: 12px 15px; 
            transition: all 0.2s; font-size: 0.95rem;
        }
        .form-control:focus { border-color: #ff7e36; box-shadow: 0 0 8px rgba(255, 126, 54, 0.1); outline: none; }
        .form-control[readonly] { background-color: #f9f9f9; cursor: not-allowed; border-color: #eee; }

        /* 수정자 강조 스타일 */
        .modifier-input { border: 2px solid #ffe0cc; }
        .modifier-input:focus { border-color: #ff7e36; }

        /* 주황색 버튼 */
        .btn-orange { background-color: #ff7e36; color: white; border-radius: 6px; font-weight: 600; border: none; padding: 12px 25px; transition: 0.2s; }
        .btn-orange:hover { background-color: #e66a20; color: white; }
        
        .btn-outline-orange { border: 1px solid #ff7e36; color: #ff7e36; border-radius: 6px; font-weight: 600; padding: 12px 25px; background: transparent; }
        .btn-outline-orange:hover { background-color: #ff7e36; color: white; }

        /* 참석자 배지 */
        #attendeeBadgeContainer { border: 1px solid #eee; background-color: #fafafa; border-radius: 8px; min-height: 60px; }
        .badge-attendee { 
            background-color: #fff0e6; color: #ff7e36; border: 1px solid #ffe0cc;
            padding: 8px 15px; border-radius: 6px; font-weight: 600; font-size: 0.9rem;
            display: flex; align-items: center;
        }
        .btn-remove-attendee { background: none; border: none; color: #ff7e36; margin-left: 8px; padding: 0; line-height: 1; font-size: 1.1rem; cursor: pointer; }

        /* 파일 관리 영역 */
        .file-manage-box { border: 1px solid #ff7e36; border-radius: 8px; background-color: #fffaf7; }

        .section-title { border-left: 4px solid #ff7e36; padding-left: 15px; margin-bottom: 25px; font-weight: 800; color: #333; }
    </style>
</head>
<body>
    <div class="top-bar"></div>
    <div class="container main-container">
        <div class="content-card">
            <div class="mb-4 pb-3 border-bottom d-flex align-items-center">
                <i class="bi bi-pencil-square text-orange fs-3 me-3" style="color:#ff7e36;"></i>
                <div>
                    <h4 class="fw-bold mb-0">회의록 수정</h4>
                    <p class="text-muted small mb-0 mt-1">변경사항을 입력한 후 수정하기 버튼을 눌러주세요.</p>
                </div>
            </div>

            <form id="updateForm">
                <input type="hidden" id="meetingId">

                <div class="section-title">기본 정보 수정</div>
                <div class="mb-4">
                    <label class="form-label fw-bold">회의 제목</label>
                    <input type="text" class="form-control" id="title" placeholder="제목을 입력하세요" required>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">회의 일시</label>
                        <input type="datetime-local" class="form-control" id="meetingDate" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">회의 장소</label>
                        <input type="text" class="form-control" id="location" placeholder="장소를 입력하세요">
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted">원작성자 (수정 불가)</label>
                        <input type="text" class="form-control" id="emplnm" readonly>
                    </div>
                </div>

                <div class="section-title text-orange" style="color: #ff7e36;">수정자 확인 <span class="small fw-normal text-muted">(필수 입력)</span></div>
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">수정자 사번 *</label>
                        <input type="text" class="form-control modifier-input" id="modifierNo" placeholder="사번을 입력하세요" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">수정자 성명 *</label>
                        <input type="text" class="form-control modifier-input" id="modifierName" placeholder="성명을 입력하세요" required>
                    </div>
                </div>

                <div class="section-title">참석자 명단 수정</div>
                <div class="mb-4">
                    <div class="input-group mb-2">
                        <input type="text" id="attendeeInput" class="form-control" placeholder="추가할 참석자 이름 입력">
                        <button class="btn btn-orange" type="button" id="addAttendeeBtn">추가</button>
                    </div>
                    <div id="attendeeBadgeContainer" class="p-3 d-flex flex-wrap gap-2 mb-2"></div>
                    <small class="text-muted"><i class="bi bi-info-circle me-1"></i>이름 옆의 X 아이콘을 누르면 명단에서 삭제됩니다.</small>
                </div>
        
                <div class="section-title">회의 내용</div>
                <div class="mb-4">
                    <textarea class="form-control" id="content" rows="10" placeholder="수정할 내용을 입력하세요"></textarea>
                </div>

                <div class="section-title">첨부파일 관리</div>
                <div class="mb-5 p-4 file-manage-box">
                    <div class="mb-3 d-flex align-items-center justify-content-between border-bottom pb-3">
                        <div>
                            <span class="text-muted small">현재 보관된 파일:</span>
                            <span id="currentFileName" class="fw-bold ms-2 text-dark">조회 중...</span>
                        </div>
                        <div id="deleteFileWrapper" style="display:none;">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="deleteOldFile">
                                <label class="form-check-label text-danger fw-bold" for="deleteOldFile">기존 파일 삭제</label>
                            </div>
                        </div>
                    </div>
                    <label class="form-label fw-bold small">새 파일로 교체하려면 아래에서 선택하세요</label>
                    <input type="file" class="form-control" id="attachedFile" accept=".pdf">
                    <div class="form-text mt-2"><i class="bi bi-exclamation-triangle me-1"></i>새 PDF 선택 시 기존 파일은 자동으로 교체됩니다.</div>
                </div>

                <div class="d-flex justify-content-end gap-3 pt-4 border-top">
                    <button type="button" class="btn btn-outline-orange" id="cancelBtn">수정 취소</button>
                    <button type="button" class="btn btn-orange shadow-sm px-5" id="updateBtn">변경사항 저장하기</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let attendeeList = [];
        
        $(document).ready(function() {
            // URL에서 meetingId 추출 
            const pathArray = window.location.pathname.split('/');
            const meetingId = pathArray[pathArray.length - 1];
            $('#meetingId').val(meetingId);
            
            // 이벤트 연결
            $('#addAttendeeBtn').click(addAttendee);
            $('#attendeeInput').keypress(e => { if(e.which == 13) { e.preventDefault(); addAttendee(); } });

            // 초기 데이터 로딩 
            $.ajax({
                type: 'GET',
                url: '/meet/api/meetings/' + meetingId,
                success: function(data) {
                    $('#title').val(data.title);
                    $('#meetingDate').val(data.meetingDate);
                    $('#location').val(data.location);
                    $('#emplnm').val(data.emplnm);
                    $('#content').val(data.content);
                }
            });

            // 파일 정보 로딩
            $.ajax({
                type: 'GET',
                url: '/meet/api/meetings/' + meetingId + '/file',
                success: function(file) {
                    if (file && file.originName) {
                        $('#currentFileName').html(`<i class="bi bi-file-earmark-pdf text-danger me-1"></i>${file.originName}`);
                        $('#deleteFileWrapper').show();
                    } else {
                        $('#currentFileName').text("첨부파일 없음");
                        $('#deleteFileWrapper').hide();
                    }
                }
            });
            
            // 참석자 정보 로딩
            $.ajax({
                type: 'GET',
                url: '/meet/api/meetings/' + meetingId + '/attendees',
                success: function(names) {
                    attendeeList = names || [];
                    renderAttendeeBadges();
                }
            });
            
            // 수정 실행 
            $('#updateBtn').on('click', function() {
                if(!$('#title').val()) { alert('제목을 입력해주세요.'); return; }
                if(!$('#meetingDate').val()) { alert('회의 일시를 선택해주세요.'); return; }
                if(!$('#modifierNo').val()) { alert('수정자 사번을 입력해주세요.'); return; }
                if(!$('#modifierName').val()) { alert('수정자 이름을 입력해주세요.'); return; }

                const fileInput = $('#attachedFile')[0];
                const file = fileInput.files[0];

                let formData = new FormData();
                
                const meetingData = {
                    title: $('#title').val(),
                    meetingDate: $('#meetingDate').val(),
                    location: $('#location').val(),
                    content: $('#content').val(),
                    modifierNo: $('#modifierNo').val(), 
                    modifierName: $('#modifierName').val(),
                    deleteFile: $('#deleteOldFile').is(':checked') 
                };

                formData.append("meeting", new Blob([JSON.stringify(meetingData)], {type: "application/json"}));
                
                if(file) {
                    formData.append("file", file);
                }

                $.ajax({
                    type: 'PUT',
                    url: '/meet/api/meetings/' + meetingId,
                    processData: false, 
                    contentType: false, 
                    data: formData,
                    success: function() {
                        const attendeeData = {
                            meetingId: meetingId,
                            names: attendeeList
                        };

                        $.ajax({
                            type: 'POST',
                            url: '/meet/api/meetings/attendees',
                            contentType: 'application/json',
                            data: JSON.stringify(attendeeData),
                            success: function() {
                                alert('회의록과 참석자 명단이 성공적으로 수정되었습니다.');
                                location.href = '/meet/meetings/detail/' + meetingId;
                            }
                        });
                    },
                    error: function() {
                        alert('수정 중 오류가 발생했습니다.');
                    }
                });
            });
            
            //취소버튼 이벤트
            $('#cancelBtn').click(function() {
                location.href = '/meet/meetings/list';
            });
        });
        
        // 배지 렌더링 (디자인 수정, 민재님 로직 유지)
        function renderAttendeeBadges() {
            const container = $('#attendeeBadgeContainer');
            container.empty();
            attendeeList.forEach((name, index) => {
                container.append(`
                    <span class="badge-attendee">
                        ${name}
                        <button type="button" class="btn-remove-attendee" onclick="removeAttendee(${index})">
                            <i class="bi bi-x"></i>
                        </button>
                    </span>
                `);
            });
        }

        // 이름 추가 
        function addAttendee() {
            const name = $('#attendeeInput').val().trim();
            if (name && !attendeeList.includes(name)) {
                attendeeList.push(name);
                $('#attendeeInput').val('');
                renderAttendeeBadges();
            }
        }

        // 이름 삭제 
        window.removeAttendee = function(index) {
            attendeeList.splice(index, 1);
            renderAttendeeBadges();
        };
    </script>
</body>
</html>
